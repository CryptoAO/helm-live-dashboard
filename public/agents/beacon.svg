<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#0c1929" stroke="#a855f7" stroke-width="2"/>
  <!-- Glow ring -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>
  <!-- Electric arcs behind head (Tesla signature) -->
  <path d="M25 40 Q30 35 28 30" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <path d="M22 45 Q28 38 25 32" stroke="#7c3aed" stroke-width="0.8" opacity="0.4"/>
  <path d="M95 40 Q90 35 92 30" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <path d="M98 45 Q92 38 95 32" stroke="#7c3aed" stroke-width="0.8" opacity="0.4"/>
  <!-- Head silhouette - distinguished (Tesla-inspired) -->
  <ellipse cx="60" cy="46" rx="20" ry="24" fill="#1e293b"/>
  <!-- Hair - dark, swept back, distinguished -->
  <path d="M40 42 Q45 20 60 18 Q75 20 80 42 Q76 28 60 26 Q44 28 40 42Z" fill="#1a1a1a"/>
  <!-- Face - angular, refined -->
  <ellipse cx="60" cy="50" rx="17" ry="21" fill="#d4a574"/>
  <!-- Mustache (Tesla signature) -->
  <path d="M52 56 Q56 59 60 57 Q64 59 68 56" stroke="#2a2a2a" stroke-width="1.8" fill="none"/>
  <!-- Eyes - deep, intense -->
  <ellipse cx="52" cy="46" rx="3.5" ry="2.5" fill="white"/>
  <ellipse cx="68" cy="46" rx="3.5" ry="2.5" fill="white"/>
  <circle cx="53" cy="46" r="1.8" fill="#1a1a2e"/>
  <circle cx="69" cy="46" r="1.8" fill="#1a1a2e"/>
  <!-- Eye glint (electric) -->
  <circle cx="54" cy="45.5" r="0.5" fill="#a855f7" opacity="0.8"/>
  <circle cx="70" cy="45.5" r="0.5" fill="#a855f7" opacity="0.8"/>
  <!-- Distinguished brows -->
  <path d="M47 42 L55 40" stroke="#333" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M73 42 L65 40" stroke="#333" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M60 48 L58 53 L62 53" stroke="#c4956a" stroke-width="0.7" fill="none"/>
  <!-- Mouth -->
  <path d="M55 60 Q60 62 65 60" stroke="#8b6f4e" stroke-width="0.8" fill="none"/>
  <!-- Victorian-era suit -->
  <path d="M38 72 Q42 62 52 66 L60 72 L68 66 Q78 62 82 72 L86 92 Q60 96 34 92Z" fill="#1e1e3a"/>
  <!-- High collar -->
  <path d="M50 66 Q55 60 60 63 Q65 60 70 66" fill="#2a2a4a"/>
  <!-- Bow tie -->
  <path d="M55 67 L60 70 L65 67 L60 73Z" fill="#a855f7" opacity="0.8"/>
  <!-- Lightning bolt icon on lapel -->
  <path d="M48 78 L51 74 L49 78 L52 74" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
  <!-- Stage badge -->
  <rect x="72" y="88" rx="8" ry="8" width="38" height="16" fill="#a855f7"/>
  <text x="91" y="99" text-anchor="middle" font-size="8" font-family="monospace" font-weight="bold" fill="white">S3</text>
  <!-- Name ring -->
  <text x="60" y="115" text-anchor="middle" font-size="7" font-family="monospace" font-weight="bold" fill="#a855f7">BEACON</text>
</svg>
